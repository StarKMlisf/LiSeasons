name: Build LiSeasons Plugin
on:
  push:
    branches: [ main ]  # 推送到main就触发构建
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21（适配Paper 1.21+）
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  # 缓存依赖，下次更快

      - name: 用Maven打包
        run: mvn clean package -DskipTests

      - name: 上传JAR到构建结果
        uses: actions/upload-artifact@v4
        with:
          name: LiSeasons-JAR
          path: target/*.jar  # 打包好的JAR在这里

      - name: 自动发布到GitHub Release（可选）
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}